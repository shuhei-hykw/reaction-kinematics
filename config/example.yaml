# Two-body reaction: beam + target -> ejectile + recoil
# Example: pi- + p -> K+ + Lambda

reaction:
  beam:     "pi-"
  target:   "p"
  ejectile: "K+"
  recoil:   "Lambda"

beam_momentum:
  value: 1.8      # GeV/c (single value)
  # scan: [1.0, 1.5, 2.0, 2.5, 3.0]  # multiple momenta

plot:
  angle_range: [0, 30]   # lab angle [deg]
  angle_steps: 300
  output_dir:  "output"
